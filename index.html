<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>🎾 Tennis Predict</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0f0f14; --card:#1a1a24; --border:#2a2a3a; --accent:#4fc3f7;
  --accent2:#0288d1; --text:#e0e0e0; --sub:#888; --muted:#555;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; }
#root { display:flex; flex-direction:column; height:100%; max-width:520px; margin:0 auto; position:relative; }

/* NAV */
.nav { background:var(--card); border-bottom:1px solid var(--border); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.nav-logo { display:flex; align-items:center; gap:6px; font-size:17px; font-weight:800; }
.nav-logo span { color:var(--accent); }
.tour-toggle { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:3px; gap:2px; }
.tour-btn { padding:5px 14px; border-radius:16px; border:none; font-size:12px; font-weight:700; cursor:pointer; background:transparent; color:var(--sub); transition:all .2s; }
.tour-btn.active { background:var(--accent); color:#000; }

/* TABS */
.tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; }
.tab { flex:1; padding:11px 8px 9px; text-align:center; font-size:12px; font-weight:600; color:var(--sub); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* DATE NAV */
.date-nav { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:var(--card); border-bottom:1px solid var(--border); flex-shrink:0; gap:8px; }
.dnav-btn { background:var(--bg); border:1px solid var(--border); color:var(--accent); border-radius:20px; padding:7px 16px; font-size:13px; font-weight:700; cursor:pointer; flex-shrink:0; transition:all .15s; }
.dnav-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }
.dnav-btn:disabled { opacity:.3; cursor:not-allowed; }
.date-center { flex:1; text-align:center; }
.date-main { font-size:14px; font-weight:700; color:var(--text); }
.date-sub { font-size:11px; color:var(--sub); margin-top:1px; }

/* SCREENS */
.screen { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; display:none; }
.screen.active { display:block; }
.screen-inner { padding:16px; padding-bottom:40px; }

/* CARDS */
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:12px; overflow:hidden; }
.card-p { padding:16px; }

/* PILLS */
.pill { display:inline-block; font-size:10px; font-weight:700; padding:3px 10px; border-radius:8px; letter-spacing:.5px; text-transform:uppercase; }
.pill-Hard { background:#1565c033; color:#90caf9; }
.pill-Clay { background:#ff8f0033; color:#ffcc80; }
.pill-Grass { background:#43a04733; color:#a5d6a7; }
.pill-Indoor { background:#6a1b9a33; color:#ce93d8; }

/* FIXTURE CARD */
.fix-card { cursor:pointer; transition:border-color .15s, transform .1s; }
.fix-card:hover { border-color:var(--accent); transform:translateY(-1px); }
.fix-card:active { transform:scale(.98); }
.fix-meta { display:flex; align-items:center; gap:7px; flex-wrap:wrap; margin-bottom:11px; }
.fix-tourn { font-size:11px; color:var(--muted); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fix-tag { font-size:10px; color:var(--muted); }
.players-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.pcol { flex:1; }
.pcol.right { text-align:right; }
.pnm { font-size:14px; font-weight:600; color:var(--text); line-height:1.2; }
.pseed { font-size:10px; color:var(--sub); margin-top:2px; }
.vs-badge { font-size:10px; font-weight:700; color:var(--muted); background:var(--bg); padding:4px 8px; border-radius:8px; border:1px solid var(--border); }
.bar-labels { display:flex; justify-content:space-between; margin-bottom:4px; }
.bar-lbl { font-size:12px; color:var(--sub); }
.bar-lbl.w { color:var(--accent); font-weight:700; }
.prob-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.prob-fill { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:3px; }
.set-lbl { font-size:11px; color:var(--sub); text-align:center; margin-top:5px; }
.pred-loading { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--sub); }
.mini-spin { width:14px; height:14px; border:2px solid #333; border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

/* DETAIL */
.detail { position:fixed; inset:0; max-width:520px; margin:0 auto; background:var(--bg); z-index:300; overflow-y:auto; -webkit-overflow-scrolling:touch; transform:translateX(100%); transition:transform .3s cubic-bezier(.4,0,.2,1); }
.detail.open { transform:none; }
.detail-nav { display:flex; align-items:center; gap:12px; padding:14px 18px; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:10; }
.back-btn { background:var(--border); border:none; color:var(--accent); padding:7px 14px; border-radius:18px; font-size:13px; font-weight:600; cursor:pointer; }
.detail-body { padding:16px; padding-bottom:48px; }

/* WINNER HERO */
.hero { background:linear-gradient(135deg,#0d2137,#0a3d62); border:1px solid #1565c0; border-radius:20px; padding:24px 20px; text-align:center; margin-bottom:16px; }
.hero-lbl { font-size:11px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.hero-nm { font-size:24px; font-weight:800; margin-bottom:4px; }
.hero-pct { font-size:44px; font-weight:900; color:var(--accent); line-height:1; margin-bottom:8px; }
.hero-sub { font-size:13px; color:var(--sub); }

/* PLAYER COMPARE */
.cmp-grid { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; margin-bottom:16px; }
.cmp-p { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; text-align:center; }
.cmp-p.win { border-color:var(--accent); }
.cmp-nm { font-size:13px; font-weight:700; line-height:1.2; margin-bottom:4px; }
.cmp-rank { font-size:11px; color:var(--sub); margin-bottom:8px; }
.cmp-elo { font-size:22px; font-weight:900; color:var(--accent); }
.cmp-elo-lbl { font-size:9px; color:var(--muted); }
.cmp-ctry { font-size:10px; color:var(--muted); margin-top:4px; }
.vs-circle { width:38px; height:38px; background:var(--card); border:1px solid var(--border); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); flex-shrink:0; }

/* SECTION */
.sec { font-size:11px; font-weight:700; color:var(--sub); letter-spacing:.5px; text-transform:uppercase; margin:4px 0 10px; }

/* CONTEXT */
.ctx-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:12px; }
.chips { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:12px; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip { background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:6px 12px; font-size:12px; white-space:nowrap; color:var(--text); flex-shrink:0; }
.factor-row { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-top:1px solid var(--border); }
.factor-info { flex:1; }
.fnm { font-size:13px; font-weight:600; color:var(--text); margin-bottom:2px; }
.fimp { font-size:11px; color:var(--sub); }
.ffav { font-size:11px; font-weight:700; color:var(--accent); text-align:right; max-width:110px; }

/* MODEL GRID */
.model-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.model-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px; }
.mnm { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:8px; }
.mtrack { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:6px; }
.mfill { height:100%; background:var(--accent); border-radius:2px; }
.mprobs { display:flex; justify-content:space-between; font-size:12px; }
.mp1 { color:var(--accent); font-weight:700; }
.mp2 { color:var(--sub); }

/* STATS */
.stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 8px; text-align:center; }
.sv { font-size:20px; font-weight:800; color:var(--text); }
.sl { font-size:9px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.3px; }

/* CONFIDENCE */
.conf-row { display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
.conf-lbl { font-size:14px; font-weight:600; }
.conf-sub { font-size:11px; color:var(--sub); margin-top:2px; }
.badge { padding:4px 14px; border-radius:10px; font-size:12px; font-weight:700; }
.badge-High { background:#1b5e20; color:#69f0ae; }
.badge-Medium { background:#e65100; color:#ffcc80; }
.badge-Low { background:#4a148c; color:#e040fb; }

/* H2H */
.h2h-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
.h2h-scores { display:flex; justify-content:space-around; align-items:flex-end; margin-bottom:12px; }
.h2h-score { font-size:36px; font-weight:900; }
.h2h-score.w { color:var(--accent); }
.h2h-pnm { font-size:11px; color:var(--sub); text-align:center; }
.h2h-dash { font-size:24px; color:var(--muted); align-self:center; margin-bottom:8px; }
.h2h-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:8px; }
.h2h-fill { height:100%; background:var(--accent); }
.h2h-total { font-size:11px; color:var(--muted); text-align:center; }

/* PICKER FORM */
.form-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:12px; }
.form2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.fgrp { display:flex; flex-direction:column; gap:6px; }
.flbl { font-size:10px; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:.4px; }
.finput { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:10px; font-size:15px; outline:none; -webkit-appearance:none; }
.finput:focus { border-color:var(--accent); }
.surf-row { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
.surf-row::-webkit-scrollbar { display:none; }
.surf-btn { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; color:var(--sub); white-space:nowrap; }
.surf-btn.active { background:var(--border); color:var(--text); }
.bo-row { display:flex; gap:10px; }
.bo-btn { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; font-size:14px; font-weight:700; cursor:pointer; color:var(--sub); }
.bo-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
.run-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--accent2),var(--accent)); border:none; border-radius:12px; color:#000; font-size:15px; font-weight:800; cursor:pointer; margin-top:4px; }
.run-btn:disabled { opacity:.5; cursor:not-allowed; }
.ferr { color:#ff5252; font-size:12px; padding:4px 0; }
.quick-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
.quick-item { display:flex; justify-content:space-between; align-items:center; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 12px; cursor:pointer; }
.quick-item:hover { border-color:var(--accent); }
.qnm { font-size:13px; font-weight:600; }
.qid { font-size:12px; color:var(--accent); }
.quick-hint { font-size:11px; color:var(--muted); margin-top:6px; }

/* RANKINGS */
.rank-list { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.rank-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); }
.rank-row:last-child { border-bottom:none; }
.rnum { font-size:15px; font-weight:800; color:var(--accent); width:28px; text-align:center; flex-shrink:0; }
.rnum.gold { color:#ffd700; } .rnum.silver { color:#c0c0c0; } .rnum.bronze { color:#cd7f32; }
.rinfo { flex:1; }
.rnm { font-size:14px; font-weight:600; }
.rctry { font-size:11px; color:var(--sub); margin-top:1px; }
.rpts { font-size:13px; font-weight:700; color:var(--sub); }

/* UTILS */
.spinner-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:60px 20px; }
.big-spin { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
.spin-msg { font-size:14px; color:var(--sub); }
.empty { text-align:center; padding:60px 20px; }
.empty-icon { font-size:48px; display:block; margin-bottom:12px; }
.empty-msg { font-size:14px; color:var(--sub); }
@keyframes spin { to { transform:rotate(360deg); } }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
/* ═══ ELITE ANALYSIS STYLES ════════════════════════════════════════════════ */

/* DETECTOR BANNERS */
.detector { border-radius:10px; padding:8px 12px; font-size:11px; font-weight:700; margin-bottom:6px; }
.detector-fragile { background:#2d1a2e; border:1px solid #9c27b0; color:#e040fb; }
.detector-danger  { background:#2d1f0a; border:1px solid #ff9800; color:#ffcc80; }
.detector-fraud   { background:#2d1a1a; border:1px solid #f44336; color:#ff8a80; }
.detector-fatigue { background:#1a2020; border:1px solid #ff5252; color:#ff6b6b; }

/* ELITE SECTION WRAPPER */
.elite-section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px 16px; margin-bottom:12px; }
.elite-sec-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.elite-sec-icon { font-size:16px; }
.elite-sec-title { font-size:12px; font-weight:700; color:var(--text); letter-spacing:.3px; flex:1; }

/* TACTICAL EDGE BADGE */
.tac-edge-badge { font-size:10px; font-weight:700; background:var(--bg); border:1px solid var(--accent); color:var(--accent); border-radius:8px; padding:3px 10px; white-space:nowrap; }

/* TACTICAL DETAIL */
.tac-detail-grid { margin-top:10px; }
.tac-row { display:flex; gap:8px; padding:5px 0; border-top:1px solid var(--border); font-size:11px; align-items:flex-start; }
.tac-key { color:var(--sub); min-width:90px; flex-shrink:0; }
.tac-val { color:var(--text); flex:1; }

/* MOMENTUM */
.mom-grid { display:flex; flex-direction:column; gap:0; }
.mom-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.mom-lbl { color:var(--sub); }
.mom-val { color:var(--text); font-weight:600; text-align:right; }

/* UPSET RISK */
.upset-score-badge { font-size:13px; font-weight:800; border:1.5px solid; border-radius:8px; padding:3px 10px; }
.upset-meter-track { height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:8px 0 6px; }
.upset-meter-fill { height:100%; border-radius:4px; transition:width 0.8s ease; }
.upset-flag { font-size:11px; color:var(--text); padding:5px 0; border-bottom:1px solid var(--border); }
.upset-flag:last-child { border-bottom:none; }

/* LIVE BETTING ANGLES */
.angle-row { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:10px 12px; margin-bottom:8px; }
.angle-trigger { font-size:12px; font-weight:700; color:var(--text); margin-bottom:3px; }
.angle-action { font-size:11px; color:var(--sub); margin-bottom:6px; }
.angle-edge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; }
.edge-High { background:#1b3a1b; color:#69f0ae; }
.edge-Medium { background:#3a2a0a; color:#ffcc80; }
.edge-Low { background:#1a1a3a; color:#90caf9; }

/* BET VERDICT */
.bet-verdict { background:linear-gradient(135deg,#0d2137,#0a3d62); border:1px solid #1565c0; border-radius:14px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
.bet-winner { font-size:14px; color:var(--text); }
.bet-winner strong { color:var(--accent); }
.bet-conf { font-size:13px; font-weight:700; }

/* FAIL LIST */
.fail-list { list-style:none; padding:0; }
.fail-list li { font-size:12px; color:var(--sub); padding:4px 0; border-bottom:1px solid var(--border); }
.fail-list li::before { content:'→ '; color:var(--muted); }
.fail-list li:last-child { border-bottom:none; }


/* ═══ LEARNING / TRACK RECORD STYLES ══════════════════════════════════════ */
.learn-hero { background:linear-gradient(135deg,#0d2a1a,#0a3d20); border:1px solid #2e7d32; border-radius:20px; padding:20px; margin-bottom:12px; text-align:center; }
.learn-acc  { font-size:48px; font-weight:900; color:#69f0ae; line-height:1; }
.learn-sub  { font-size:12px; color:#81c784; margin-top:4px; }
.learn-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.learn-stat { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; }
.learn-stat .sv { font-size:22px; font-weight:800; color:var(--accent); }
.learn-stat .sl { font-size:10px; color:var(--sub); margin-top:2px; }
.surf-row   { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:12px; }
.surf-row:last-child { border-bottom:none; }
.surf-bar-wrap { flex:1; height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin:0 10px; }
.surf-bar-fill { height:100%; background:var(--accent); border-radius:3px; }
.pending-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
.pending-match { font-size:13px; font-weight:700; margin-bottom:4px; }
.pending-meta  { font-size:11px; color:var(--sub); margin-bottom:10px; }
.pending-pred  { font-size:12px; color:var(--accent); margin-bottom:10px; }
.outcome-btns  { display:flex; gap:8px; }
.outcome-btn   { flex:1; padding:10px; border-radius:10px; border:none; font-size:12px; font-weight:700; cursor:pointer; }
.outcome-btn.p1 { background:#1b3a1b; color:#69f0ae; border:1px solid #2e7d32; }
.outcome-btn.p2 { background:#3a1b1b; color:#ff8a80; border:1px solid #7d2e2e; }
.history-row  { display:flex; gap:8px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
.history-row:last-child { border-bottom:none; }
.hist-icon { font-size:18px; flex-shrink:0; margin-top:1px; }
.hist-body { flex:1; font-size:11px; }
.hist-match { font-weight:700; color:var(--text); margin-bottom:2px; }
.hist-meta  { color:var(--sub); }
.hist-analysis { color:var(--muted); font-style:italic; margin-top:3px; font-size:10px; }
.flag-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.flag-row:last-child { border-bottom:none; }
.weights-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.weight-card  { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.weight-val   { font-size:18px; font-weight:800; color:var(--accent); }
.weight-lbl   { font-size:10px; color:var(--sub); }
.learn-badge  { display:inline-flex; align-items:center; gap:4px; background:#1b3a1b; border:1px solid #2e7d32; color:#69f0ae; font-size:10px; font-weight:700; padding:3px 8px; border-radius:8px; margin-left:6px; }

/* ═══ TOURNAMENT GROUP STYLES ═══════════════════════════════════════════════ */
.tour-group        { margin-bottom:14px; }
.tour-group-header { display:flex; align-items:center; gap:8px; padding:10px 14px; 
                     background:var(--card); border:1px solid var(--border); 
                     border-radius:12px; cursor:pointer; user-select:none; margin-bottom:6px; }
.tour-group-header.collapsed { border-radius:12px; }
.tour-group-header:active { opacity:0.8; }

function determineBestOf(fixture, tour) {
  // Explicit value from API - trust it if present and valid
  if (fixture.bestOf && (fixture.bestOf === 3 || fixture.bestOf === 5)) return fixture.bestOf;

  const tName = ((fixture.tournament?.name) || '').toLowerCase();
  const rankId = fixture.tournament?.rankId || 0;

  // WTA: always Bo3 (no Bo5 events on WTA)
  if (tour === 'wta') return 3;

  // ATP Grand Slams - Bo5 for men's singles
  const grandSlamKeywords = ['australian open', 'roland garros', 'french open', 'wimbledon', 'us open', 'usopen', 'grand slam'];
  for (const kw of grandSlamKeywords) {
    if (tName.includes(kw)) return 5;
  }

  // rankId >= 4 typically indicates Grand Slam level in this API
  if (rankId >= 4) return 5;

  // Davis Cup final (Bo5 matches in group stage and finals)
  if (tName.includes('davis cup')) return 5;

  return 3;
}

// ── HEURISTIC PLAYER INTEL (for players not in KB) ──────────────────────────
function buildPlayerIntel(player, surface, tour, priorMatchMinutes) {
  const kb = PLAYER_KB[player.id];
  const rank = player.rank || 500;
  const country = player.country || '';

  // Physical Readiness heuristics
  let physReadiness = kb?.physReadiness ?? Math.min(9.5, 6 + (200-Math.min(200,rank))/200*2.5);
  let fatigueRisk = kb?.fatigueRisk ?? 'Low';

  // Degrade if player had long recent match (passed in from fixture context)
  if (priorMatchMinutes) {
    if (priorMatchMinutes > 200) { physReadiness = Math.max(3.0, physReadiness - 2.5); fatigueRisk = 'High'; }
    else if (priorMatchMinutes > 150) { physReadiness = Math.max(4.5, physReadiness - 1.5); fatigueRisk = 'Medium'; }
    else if (priorMatchMinutes > 120) { physReadiness = Math.max(5.5, physReadiness - 0.8); fatigueRisk = 'Medium'; }
  }

  // Surface score heuristics
  const surfKey = surface.toLowerCase().replace(' ','');
  let surfScore = kb?.surfaceScore?.[surfKey.slice(0,4)] ?? 5.5;
  if (!kb) {
    // Estimate from country clay bonus
    const cb = clayBonus(country);
    if (surface==='Clay') surfScore = Math.min(9.5, 5 + cb*8 + (200-Math.min(200,rank))/200*2);
    else surfScore = Math.min(9, 5 + (200-Math.min(200,rank))/200*2.5);
  }

  // Surface record
  const surfRec = kb?.surfaceRec?.[surfKey.slice(0,4)] || {
    last10W: Math.round(surfScore*0.9), last10L: Math.round(10-surfScore*0.9),
    holdPct: (0.60 + surfScore*0.025).toFixed(2)*1,
    breakPct: (0.28 + surfScore*0.018).toFixed(2)*1,
    tbWR: `${Math.round(surfScore*0.5)}-${Math.round(5-surfScore*0.2)}`
  };

  // Tactical profile
  const tp = kb?.tacticalProfile || {
    servePlus1: 'Standard patterns', backhand: 'Standard two-hander',
    netPlay: 'Occasional', dropShot: 'Rare', rallyLength: 'Medium',
    returnGame: 'Average', weakness: 'Under construction', strength: 'Ranked game'
  };

  // Mental profile
  const mp = kb?.mental || {
    recentConfidence: rank < 50 ? 'High' : rank < 100 ? 'Medium' : 'Low',
    clutch: rank < 30 ? 'Proven' : 'Unknown',
    fragile: false, dangerousUnderdog: rank > 80,
    tbTrend: 'neutral'
  };

  return { physReadiness, fatigueRisk, surfScore, surfRec, tacticalProfile: tp, mental: mp, injuries: kb?.injuries||[], recentLoad: kb?.recentLoad||'normal' };
}

// ── TACTICAL MATCHUP ENGINE ───────────────────────────────────────────────────
function analyzeTacticalMatchup(p1, p2, surface, p1Intel, p2Intel) {
  const t1 = p1Intel.tacticalProfile, t2 = p2Intel.tacticalProfile;
  let score = 0; // positive = P1 advantage, negative = P2 advantage
  const insights = [];

  // Drop shot specialist vs limited mover
  if (t2.dropShot.includes('Elite') || t2.dropShot.includes('top')) {
    if (t1.weakness?.toLowerCase().includes('drop') || t1.weakness?.toLowerCase().includes('net')) {
      score -= 1.5;
      insights.push({ type:'⚠️ Tactical Nightmare', text:`${p2.name}'s drop-shot game directly attacks ${p1.name}'s baseline-anchored style`, favors: p2.name });
    }
  }
  if (t1.dropShot.includes('Elite') || t1.dropShot.includes('top')) {
    if (t2.weakness?.toLowerCase().includes('drop') || t2.weakness?.toLowerCase().includes('net')) {
      score += 1.5;
      insights.push({ type:'⚠️ Tactical Nightmare', text:`${p1.name}'s drop-shot game directly attacks ${p2.name}'s baseline-anchored style`, favors: p1.name });
    }
  }

  // Return game vs serve weakness
  if (t1.returnGame.includes('Elite') || t1.returnGame.includes('elite')) {
    if (p2Intel.surfRec.holdPct < 0.68) {
      score += 1.2;
      insights.push({ type:'🎯 Return Weapon', text:`${p1.name}'s elite return game exploits ${p2.name}'s hold % on ${surface}`, favors: p1.name });
    }
  }
  if (t2.returnGame.includes('Elite') || t2.returnGame.includes('elite')) {
    if (p1Intel.surfRec.holdPct < 0.68) {
      score -= 1.2;
      insights.push({ type:'🎯 Return Weapon', text:`${p2.name}'s elite return game exploits ${p1.name}'s hold % on ${surface}`, favors: p2.name });
    }
  }

  // Rally length preference mismatch
  const p1ShortRally = t1.rallyLength.includes('Short') || t1.dropShot.includes('Elite');
  const p2LongRally = t2.rallyLength.includes('Long') || t2.rallyLength.includes('10+');
  if (p1ShortRally && p2LongRally) {
    score += 0.8;
    insights.push({ type:'📊 Rally Disruption', text:`${p1.name} shortens rallies, denying ${p2.name}'s preferred grind`, favors: p1.name });
  }
  const p2ShortRally = t2.rallyLength.includes('Short') || t2.dropShot.includes('Elite');
  const p1LongRally = t1.rallyLength.includes('Long') || t1.rallyLength.includes('10+');
  if (p2ShortRally && p1LongRally) {
    score -= 0.8;
    insights.push({ type:'📊 Rally Disruption', text:`${p2.name} shortens rallies, denying ${p1.name}'s preferred grind`, favors: p2.name });
  }

  // Surface-specific: big server on slow clay
  if (surface === 'Clay') {
    const p1BigServe = t1.servePlus1?.includes('big') || t1.strength?.includes('serve');
    const p2BigServe = t2.servePlus1?.includes('big') || t2.strength?.includes('serve');
    if (p1BigServe && !p2BigServe) {
      score -= 0.5; // big serve less effective on clay
      insights.push({ type:'🏗️ Surface Impact', text:`${p1.name}'s big serve is neutralized on slow clay`, favors: p2.name });
    }
  }

  // Left-hand serve disruption
  const p1Left = t1.servePlus1?.includes('wide') && p1Intel.tacticalProfile.backhand?.includes('slice');
  const p2Left = t2.servePlus1?.includes('wide') && p2Intel.tacticalProfile.backhand?.includes('slice');
  if (p2Left && !p1Left) {
    score -= 0.6;
    insights.push({ type:'🔄 Hand Advantage', text:`${p2.name}'s left-hand serve creates unusual angles vs ${p1.name}`, favors: p2.name });
  }
  if (p1Left && !p2Left) {
    score += 0.6;
    insights.push({ type:'🔄 Hand Advantage', text:`${p1.name}'s left-hand serve creates unusual angles vs ${p2.name}`, favors: p1.name });
  }

  // Tiebreak edge
  const p1TbPos = p1Intel.mental.tbTrend === 'positive', p2TbPos = p2Intel.mental.tbTrend === 'positive';
  if (p1TbPos && !p2TbPos) {
    score += 0.4;
    insights.push({ type:'🎲 Tiebreak Edge', text:`${p1.name} has strong tiebreak record; ${p2.name} historically weak`, favors: p1.name });
  } else if (p2TbPos && !p1TbPos) {
    score -= 0.4;
    insights.push({ type:'🎲 Tiebreak Edge', text:`${p2.name} has strong tiebreak record; ${p1.name} historically weak`, favors: p2.name });
  }

  // Fatigue + movement exploitation
  if (p1Intel.fatigueRisk === 'High' && (t2.dropShot.includes('Elite')||t2.rallyLength.includes('Long'))) {
    score -= 1.0;
    insights.push({ type:'💀 Fatigue Exploit', text:`${p2.name}'s style maximally exploits ${p1.name}'s compromised movement`, favors: p2.name });
  }
  if (p2Intel.fatigueRisk === 'High' && (t1.dropShot.includes('Elite')||t1.rallyLength.includes('Long'))) {
    score += 1.0;
    insights.push({ type:'💀 Fatigue Exploit', text:`${p1.name}'s style maximally exploits ${p2.name}'s compromised movement`, favors: p1.name });
  }

  // Tactical edge label
  let tacticalEdge;
  if (score >= 2) tacticalEdge = `Strong ${p1.name.split(' ').pop()}`;
  else if (score >= 0.8) tacticalEdge = `Slight ${p1.name.split(' ').pop()}`;
  else if (score <= -2) tacticalEdge = `Strong ${p2.name.split(' ').pop()}`;
  else if (score <= -0.8) tacticalEdge = `Slight ${p2.name.split(' ').pop()}`;
  else tacticalEdge = 'Neutral';

  return { score, tacticalEdge, insights, rawScore: score };
}

// ── UPSET RISK CALCULATOR ────────────────────────────────────────────────────
function calcUpsetRisk(p1, p2, p1Intel, p2Intel, tactical, baseProb, surface, isGrandSlam) {
  // p1 is expected winner; calculate risk of p2 winning
  if (baseProb <= 0.5) return { score: 0, flags: [], detectors: {} }; // p2 already favored

  let upsetScore = 0;
  const flags = [];
  const detectors = { fragileFavorite: false, dangerousUnderdog: false, surfaceFraud: false, fatigueCollapse: false };

  // Fatigue collapse detector
  if (p1Intel.fatigueRisk === 'High') {
    upsetScore += 22;
    flags.push('🔥 Fatigue Collapse Risk — ' + p1.name + ' severely taxed from previous match');
    detectors.fatigueCollapse = true;
  } else if (p1Intel.fatigueRisk === 'Medium') {
    upsetScore += 10;
    flags.push('⚠️ Moderate Fatigue — ' + p1.name + ' had extended previous match');
  }

  // Fragile favorite detector
  if (p1Intel.mental.fragile || p1Intel.mental.recentConfidence === 'Low') {
    upsetScore += 18;
    flags.push('💔 Fragile Favorite — ' + p1.name + '\'s form/confidence does not match reputation');
    detectors.fragileFavorite = true;
  }

  // Surface fraud detector
  if (p1Intel.surfScore < 5.5) {
    upsetScore += 15;
    flags.push('🚨 Surface Fraud — ' + p1.name + '\'s surface record severely below reputation');
    detectors.surfaceFraud = true;
  }

  // Dangerous underdog detector
  if (p2Intel.mental.dangerousUnderdog) {
    upsetScore += 14;
    flags.push('⚡ Dangerous Underdog — ' + p2.name + '\'s disruptive style creates genuine upset potential');
    detectors.dangerousUnderdog = true;
  }

  // Tactical nightmare
  if (tactical.score < -1.5) {
    upsetScore += 16;
    flags.push('🎯 Tactical Nightmare — ' + p2.name + '\'s style naturally disrupts ' + p1.name + '\'s strengths');
  }

  // Injury risk
  if (p1Intel.injuries?.length > 0) {
    const activeInjury = p1Intel.injuries.some(i => i.includes('active') || i.includes('2026'));
    if (activeInjury) { upsetScore += 20; flags.push('🩹 Known Injury — ' + p1.name + ' carrying physical issue'); }
    else { upsetScore += 6; flags.push('📋 Injury History — ' + p1.name + ' has known physical vulnerabilities'); }
  }

  // Grand Slam pressure (if underdog has history)
  if (isGrandSlam && p2Intel.mental.clutch?.includes('history')) {
    upsetScore += 8;
    flags.push('🏆 Grand Slam Moment — ' + p2.name + ' performs above ranking at Slams');
  }

  // P2 underdog momentum
  if (p2Intel.mental.recentConfidence === 'High' || p2Intel.mental.recentConfidence === 'Very High') {
    upsetScore += 8;
    flags.push('🔥 Underdog Momentum — ' + p2.name + ' enters with high confidence');
  }

  // ELO gap dampening (very large gaps reduce upset probability)
  const eloGap = p1.elo - p2.elo;
  if (eloGap > 150) upsetScore = Math.max(5, upsetScore * 0.6);
  else if (eloGap > 80) upsetScore = upsetScore * 0.8;

  return {
    score: Math.min(100, Math.round(upsetScore)),
    flags,
    detectors
  };
}

// ── MOMENTUM ANALYSIS ────────────────────────────────────────────────────────
function analyzeMomentum(p1, p2, p1Intel, p2Intel) {
  const m1 = p1Intel.mental, m2 = p2Intel.mental;
  const confMap = { 'Very High': 5, 'High': 4, 'Medium': 3, 'Low': 2, 'Very Low': 1 };
  const c1 = confMap[m1.recentConfidence] || 3;
  const c2 = confMap[m2.recentConfidence] || 3;
  const delta = c1 - c2;
  let momentumFlag = '';
  if (Math.abs(delta) >= 2) momentumFlag = 'Momentum Mismatch';

  return {
    p1Conf: m1.recentConfidence,
    p2Conf: m2.recentConfidence,
    p1Clutch: m1.clutch,
    p2Clutch: m2.clutch,
    p1Fragile: m1.fragile,
    p2Dangerous: m2.dangerousUnderdog,
    momentumFlag,
    delta
  };
}

// ── LIVE BETTING ANGLES ──────────────────────────────────────────────────────
function buildLiveBettingAngles(p1, p2, p1Intel, p2Intel, tactical, upsetRisk, winProb, bestOf) {
  const angles = [];
  const isP1Fav = winProb > 0.5;
  const fav = isP1Fav ? p1 : p2;
  const dog = isP1Fav ? p2 : p1;
  const favIntel = isP1Fav ? p1Intel : p2Intel;
  const dogIntel = isP1Fav ? p2Intel : p1Intel;

  if (favIntel.fatigueRisk === 'High') {
    angles.push({ trigger: `If ${fav.name} drops Set 1`, action: `Fade ${fav.name} — fatigue will compound through match`, edge: 'High' });
    angles.push({ trigger: `Sets 3-4 with match tied`, action: `Back ${dog.name} — physical collapse window`, edge: 'High' });
  }
  if (dogIntel.mental.dangerousUnderdog || tactical.score < -1) {
    angles.push({ trigger: `If ${dog.name} wins Set 1`, action: `Don't immediately back ${fav.name} — tactical disruption is real`, edge: 'Medium' });
  }
  if (bestOf === 5) {
    angles.push({ trigger: 'Set 3 momentum shift', action: `In Bo5, set 3 winner closes out 78% of the time at Slams`, edge: 'Medium' });
  }
  if (favIntel.mental.tbTrend === 'negative' || dogIntel.mental.tbTrend === 'positive') {
    angles.push({ trigger: 'Any set reaches tiebreak', action: `Favour ${dog.name} in TBs — tiebreak record advantage`, edge: 'Medium' });
  }
  angles.push({ trigger: `${fav.name} breaks serve early`, action: `Strong close signal — back ${fav.name} in-set betting`, edge: 'Low' });

  return angles;
}

// ── ELITE FULL ANALYSIS BUILDER ───────────────────────────────────────────────
function buildEliteAnalysis(p1, p2, surface, bestOf, p1Intel, p2Intel, tactical, upsetRisk, momentum, liveAngles, winProb, h2h) {
  const isP1Win = winProb > 0.5;
  const winner = isP1Win ? p1 : p2;
  const loser = isP1Win ? p2 : p1;
  const winnerIntel = isP1Win ? p1Intel : p2Intel;
  const loserIntel = isP1Win ? p2Intel : p1Intel;

  // Confidence level based on multiple factors
  const confFactors = [
    Math.abs(winProb - 0.5) > 0.2, // big gap
    upsetRisk.score < 25,
    tactical.score * (isP1Win ? 1 : -1) > 0,
    winnerIntel.fatigueRisk === 'Low',
    winnerIntel.surfScore > 7.0,
  ].filter(Boolean).length;

  const confidence = confFactors >= 4 ? 'Very High' : confFactors >= 3 ? 'High' : confFactors >= 2 ? 'Medium' : 'Low';

  // What could cause prediction to fail
  const failReasons = [];
  if (winnerIntel.injuries?.length > 0) failReasons.push(`${winner.name} injury flare-up`);
  if (winnerIntel.fatigueRisk !== 'Low') failReasons.push(`${winner.name} physical fatigue compounds`);
  if (loserIntel.mental.dangerousUnderdog) failReasons.push(`${loser.name}'s disruptive style catches ${winner.name} off-guard`);
  if (loserIntel.surfScore > 8) failReasons.push(`${loser.name} finds top-level surface form`);
  if (tactical.score * (isP1Win ? -1 : 1) > 1) failReasons.push(`Tactical patterns shift dramatically mid-match`);
  if (!failReasons.length) failReasons.push(`${loser.name} plays career-best match`, `Weather conditions heavily impact play`);

  return {
    p1Intel, p2Intel, tactical, upsetRisk, momentum, liveAngles,
    eliteSummary: { winner: winner.name, winProb: (Math.max(winProb,1-winProb)*100).toFixed(1), confidence, failReasons }
  };
}


// ─── API ────────────────────────────────────────────────────────────────────
async function apiFetch(path, params={}) {
  const url = new URL(BASE + path);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url, { headers: HDR });
  if (!r.ok) throw new Error(`API error ${r.status}`);
  return r.json();
}
function toList(d) {
  if (Array.isArray(d)) return d;
  if (d && typeof d==='object' && Array.isArray(d.data)) return d.data;
  return [];
}

async function fetchFixtures(tour, date) {
  // Always use dated endpoint for consistent results
  const path = `/tennis/v2/${tour}/fixtures/${date}`;
  // Paginate through all pages until hasNextPage is false
  let all = [], page = 1, hasMore = true;
  while (hasMore && page <= 10) {
    const res = await apiFetch(path, {
      include: 'round,tournament.court,tournament.rank',
      filter: 'PlayerGroup:singles',
      pageSize: 100, pageNo: page
    });
    const items = toList(res);
    all = all.concat(items);
    hasMore = (typeof res === 'object' && !Array.isArray(res)) ? !!res.hasNextPage : false;
    page++;
    if (!items.length) break;
  }
  return all;
}

async function fetchRankings(tour) {
  return toList(await apiFetch(`/tennis/v2/${tour}/ranking/singles`, { pageSize:200 }));
}

async function buildRankCache(tour) {
  if (state.rankCache.size && state.rankCacheTour === tour) return;
  const rows = await fetchRankings(tour);
  state.rankCache.clear();
  rows.forEach(e => {
    const p = e.player || e;
    const id = p.id;
    if (id) state.rankCache.set(id, { rank: e.position||e.rank, pts: e.point||e.points, name: p.name, country: p.countryAcr||p.country });
  });
  state.rankCacheTour = tour;
}

async function getPlayerStats(pid, tour) {
  const rc = state.rankCache;
  const re = rc.get(pid) || {};
  const def = tour === 'atp'
    ? {fp:0.62,w1:0.73,w2:0.52,bps:0.62,bpc:0.38,ace:0.8,df:0.3}
    : {fp:0.60,w1:0.68,w2:0.47,bps:0.57,bpc:0.43,ace:0.2,df:0.5};
  const rank = re.rank || 999;
  // Scale stats from rank (top players have better stats)
  const boost = Math.max(0, Math.min(0.12, (200 - rank) / 200 * 0.12));
  return {
    id: pid, name: re.name || `Player #${pid}`,
    rank, pts: re.pts || 0, country: re.country || '',
    elo: Math.round(1500 + Math.max(0, (200 - rank) * 1.5)),
    ...def,
    fp: Math.min(0.72, def.fp + boost),
    w1: Math.min(0.82, def.w1 + boost),
    ace: def.ace + boost * 2,
  };
}

async function getH2H(p1id, p2id, tour) {
  try {
    const d = await apiFetch(`/tennis/v2/${tour}/h2h`, { player1Id:p1id, player2Id:p2id, pageSize:20 });
    const list = toList(d);
    if (!list.length) return null;
    let p1w=0, p2w=0;
    list.forEach(m => {
      const w = (m.winner||{}).id;
      if (w===p1id) p1w++;
      else if (w===p2id) p2w++;
    });
    return { n:list.length, p1w, p2w, wr: p2w+p1w ? p1w/(p1w+p2w) : 0.5, ok:true };
  } catch { return null; }
}

// ─── WEATHER ────────────────────────────────────────────────────────────────
async function getWeather(countryAcr, surface) {
  const isOutdoor = surface !== 'Indoor Hard';
  if (!isOutdoor) return { condition:'Indoor', tempC:20, windKph:0, rainProbPct:0, isOutdoor:false, factors:[] };
  try {
    const [lat, lon] = CITY_COORDS[countryAcr] || CITY_COORDS['DEF'];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,precipitation_probability_max,windspeed_10m_max&forecast_days=1&timezone=auto`;
    const d = await fetch(url).then(r=>r.json());
    const daily = d.daily || {};
    const tempC = daily.temperature_2m_max?.[0] ?? 20;
    const windKph = daily.windspeed_10m_max?.[0] ?? 10;
    const rainProbPct = daily.precipitation_probability_max?.[0] ?? 0;
    let condition = 'Clear';
    if (rainProbPct > 60) condition = 'Rain Risk';
    else if (windKph > 30) condition = 'Windy';
    else if (tempC > 32) condition = 'Extreme Heat';
    else if (tempC > 27) condition = 'Hot';
    else if (tempC < 8) condition = 'Cold';
    const factors = [];
    if (windKph > 25) factors.push({factor:'High Wind',impact:`${windKph.toFixed(0)}km/h — disrupts serve rhythm`,favors:'Returners/Baseliners',delta:-0.02});
    if (tempC > 30) factors.push({factor:'Heat',impact:`${tempC.toFixed(0)}°C — physical attrition`,favors:'Fitter / Younger player',delta:-0.01});
    if (tempC < 10) factors.push({factor:'Cold',impact:'Ball plays slower',favors:'Heavy topspin players',delta:0.01});
    if (rainProbPct > 50) factors.push({factor:'Rain Risk',impact:`${rainProbPct}% chance of delays`,favors:'Momentum leaders',delta:-0.01});
    return { condition, tempC, windKph, rainProbPct, isOutdoor, factors };
  } catch { return { condition:'Clear', tempC:20, windKph:10, rainProbPct:0, isOutdoor:true, factors:[] }; }
}

// ─── PREDICTION MODELS ──────────────────────────────────────────────────────
function eloWinProb(elo1, elo2) { return 1 / (1 + Math.pow(10, (elo2-elo1)/400)); }

function surfaceAdj(p, surface) {
  const adj = {...p};
  if (surface==='Clay') { adj.w1=Math.max(0.55,p.w1-0.04); adj.fp=Math.max(0.55,p.fp-0.02); }
  else if (surface==='Grass') { adj.w1=Math.min(0.85,p.w1+0.05); adj.ace=p.ace*1.4; }
  else if (surface==='Indoor Hard') { adj.w1=Math.min(0.82,p.w1+0.02); adj.ace=p.ace*1.15; }
  return adj;
}

function clayBonus(country) {
  return ['ESP','ARG','ITA','BRA','FRA','POR','CHI'].includes(country) ? 0.025 : 0;
}

function holdProb(srv, ret) {
  const bpc = ret.bpc * (1 - srv.w1);
  return (1 - bpc) * (srv.w1 > 0 ? 1 : 0.5) + srv.w1 * 0.7;
}

function monteCarlo(p1, p2, surface, bestOf, h2h, weather, roundId) {
  const s1 = surfaceAdj(p1, surface), s2 = surfaceAdj(p2, surface);
  let h2hAdj = 0;
  if (h2h?.ok) h2hAdj = (h2h.wr - 0.5) * 0.08;
  let weatherAdj = 0;
  weather.factors?.forEach(f => { weatherAdj += f.delta || 0; });
  const roundBoost = roundId >= 9 ? 0.015 : 0; // SF/F: bigger Elo gap matters more

  let p1wins = 0;
  const SIMS = 3000;
  const setsToWin = bestOf === 5 ? 3 : 2;

  for (let i=0; i<SIMS; i++) {
    let p1sets=0, p2sets=0, totGames=0, totBreaks=0;
    while (p1sets < setsToWin && p2sets < setsToWin) {
      let p1games=0, p2games=0;
      while (true) {
        // P1 serving
        const p1hold = s1.w1 + h2hAdj + weatherAdj + roundBoost;
        const p2break = s2.bpc * (1 - s1.w1);
        if (Math.random() > Math.min(0.92, p1hold)) { p2games++; totBreaks++; }
        else p1games++;
        totGames++;
        // P2 serving
        const p2hold = s2.w1 - h2hAdj - weatherAdj + roundBoost;
        const p1break = s1.bpc * (1 - s2.w1);
        if (Math.random() > Math.min(0.92, p2hold)) { p1games++; totBreaks++; }
        else p2games++;
        totGames++;
        if (p1games >= 6 && p1games - p2games >= 2) { p1sets++; break; }
        if (p2games >= 6 && p2games - p1games >= 2) { p2sets++; break; }
        if (p1games === 6 && p2games === 6) {
          if (Math.random() > 0.5) p1sets++; else p2sets++;
          break;
        }
      }
    }
    if (p1sets > p2sets) p1wins++;
  }
  const p1wp = p1wins / SIMS;
  return { model:'Monte Carlo', p1WinProb:p1wp, p2WinProb:1-p1wp,
    predictedSetScore: bestOf===5 ? (p1wp>0.65?'3-0':(p1wp>0.5?'3-1':(p1wp>0.38?'3-2':(p1wp>0.25?'2-3':'1-3')))) : (p1wp>0.5?'2-0':'0-2'),
    avgTotalSets: bestOf===5?(3.0 + (0.5 - Math.abs(p1wp - 0.5)) * 4.0):(2.0 + (0.5 - Math.abs(p1wp - 0.5)) * 2.0), avgTotalGames: bestOf===5?37.5:22.5, avgTotalBreaks:bestOf===5?6.8:4.2,
    estAcesP1:s1.ace*12, estAcesP2:s2.ace*12 };
}

function logisticReg(p1, p2, surface, bestOf, h2h, weather) {
  const s1=surfaceAdj(p1,surface), s2=surfaceAdj(p2,surface);
  const rankDiff = Math.log(Math.max(1,p2.rank)) - Math.log(Math.max(1,p1.rank));
  const eloDiff = (p1.elo - p2.elo) / 400;
  const surfDiff = (s1.w1 - s2.w1) * 2;
  const h2hFactor = h2h?.ok ? (h2h.wr - 0.5) * 0.5 : 0;
  const cb1 = surface==='Clay' ? clayBonus(p1.country) : 0;
  const cb2 = surface==='Clay' ? clayBonus(p2.country) : 0;
  const weatherDelta = (weather.factors||[]).reduce((a,f)=>a+(f.delta||0),0);
  const z = 0.8*eloDiff + 0.6*rankDiff + 0.4*surfDiff + h2hFactor + (cb1-cb2)*2 + weatherDelta*5;
  const p1wp = 1/(1+Math.exp(-z));
  return { model:'Logistic Reg.', p1WinProb:p1wp, p2WinProb:1-p1wp,
    predictedSetScore: bestOf===5?(p1wp>0.65?'3-0':(p1wp>0.5?'3-1':(p1wp>0.38?'3-2':(p1wp>0.25?'2-3':'1-3')))):(p1wp>0.58?'2-0':'2-1'),
    avgTotalSets:2.4, avgTotalGames:23, avgTotalBreaks:5, estAcesP1:s1.ace*11, estAcesP2:s2.ace*11 };
}

function poissonModel(p1, p2, surface, bestOf, h2h) {
  const s1=surfaceAdj(p1,surface), s2=surfaceAdj(p2,surface);
  // Expected games per set: based on hold probs
  const h1 = Math.min(0.92, s1.w1 + 0.1); // P1 hold prob on serve
  const h2 = Math.min(0.92, s2.w1 + 0.1);
  // Prob P1 wins a set game = weighted by serve games
  const p1winGame = (h1 + (1-h2)) / 2;
  // Prob P1 wins set (simplified: first to 6 games with margin 2)
  let p1WinSet = p1winGame;
  if (p1WinSet < 0.3) p1WinSet = 0.3;
  if (p1WinSet > 0.7) p1WinSet = 0.7;
  const h2hAdj = h2h?.ok ? (h2h.wr-0.5)*0.06 : 0;
  p1WinSet = Math.min(0.82, Math.max(0.18, p1WinSet + h2hAdj));
  const setsToWin = bestOf===5?3:2;
  // Prob of winning match: sum of ways to win
  let p1mp = 0;
  if (bestOf===3) {
    p1mp = p1WinSet**2 + 2*p1WinSet**2*(1-p1WinSet);
  } else {
    // Bo5
    p1mp = p1WinSet**3 + 3*p1WinSet**3*(1-p1WinSet) + 6*p1WinSet**3*(1-p1WinSet)**2;
  }
  p1mp = Math.min(0.92, Math.max(0.08, p1mp));
  const avgSets = bestOf===5 ? (3.0 + (0.5-Math.abs(p1WinSet-0.5))*4.0) : (2.0 + (0.5-Math.abs(p1WinSet-0.5))*2.0);
  return { model:'Poisson', p1WinProb:p1mp, p2WinProb:1-p1mp,
    predictedSetScore: bestOf===5?(p1mp>0.65?'3-0':(p1mp>0.5?'3-1':(p1mp>0.38?'3-2':(p1mp>0.25?'2-3':'1-3')))):(p1mp>0.58?'2-0':'2-1'),
    avgTotalSets:parseFloat(avgSets.toFixed(1)), avgTotalGames:bestOf===5?Math.round(avgSets*9.5):22, avgTotalBreaks:bestOf===5?6.8:4.8,
    estAcesP1:s1.ace*10, estAcesP2:s2.ace*10 };
}

function analytical(p1, p2, surface, bestOf, h2h, weather) {
  const s1=surfaceAdj(p1,surface), s2=surfaceAdj(p2,surface);
  const eloProb = eloWinProb(p1.elo, p2.elo);
  const servAdv = (s1.w1 - s2.w1) * 0.4;
  const h2hAdj = h2h?.ok ? (h2h.wr-0.5)*0.08 : 0;
  const cb = surface==='Clay' ? (clayBonus(p1.country)-clayBonus(p2.country)) : 0;
  const weatherDelta = (weather.factors||[]).reduce((a,f)=>a+(f.delta||0),0);
  const bo5boost = bestOf===5 && p1.elo>p2.elo ? 0.035 : bestOf===5 ? -0.035 : 0; // Bo5 amplifies quality gaps
  let p1wp = Math.min(0.93, Math.max(0.07, eloProb + servAdv + h2hAdj + cb + weatherDelta + bo5boost));
  return { model:'Analytical', p1WinProb:p1wp, p2WinProb:1-p1wp,
    predictedSetScore: bestOf===5?(p1wp>0.65?'3-0':(p1wp>0.5?'3-1':(p1wp>0.38?'3-2':(p1wp>0.25?'2-3':'1-3')))):(p1wp>0.58?'2-0':'2-1'),
    avgTotalSets:2.3, avgTotalGames:23.5, avgTotalBreaks:5.5,
    estAcesP1:s1.ace*11, estAcesP2:s2.ace*11 };
}

function superCombined(models, p1, p2, surface, bestOf) {
  const [mc, lr, po, an] = models;
  const lw = window._learnedW;
  const w = lw ? [lw.mc, lw.lr, lw.po, lw.an] : [0.30, 0.25, 0.25, 0.20];
  const p1wp = mc.p1WinProb*w[0] + lr.p1WinProb*w[1] + po.p1WinProb*w[2] + an.p1WinProb*w[3];
  const probs = models.map(m=>m.p1WinProb);
  const mean = probs.reduce((a,b)=>a+b,0)/probs.length;
  const std = Math.sqrt(probs.reduce((a,b)=>a+(b-mean)**2,0)/probs.length);
  const confidence = std < 0.05 ? 'High' : std < 0.12 ? 'Medium' : 'Low';
  const s1=surfaceAdj(p1,surface), s2=surfaceAdj(p2,surface);
  return {
    model:'Super Combined', p1WinProb:p1wp, p2WinProb:1-p1wp,
    predictedSetScore: bestOf===5?(p1wp>0.65?'3-0':(p1wp>0.5?'3-1':(p1wp>0.38?'3-2':(p1wp>0.25?'2-3':'1-3')))):(p1wp>0.58?'2-0':'2-1'),
    avgTotalSets: models.reduce((a,m)=>a+m.avgTotalSets,0)/4,
    avgTotalGames: models.reduce((a,m)=>a+m.avgTotalGames,0)/4,
    avgTotalBreaks: models.reduce((a,m)=>a+m.avgTotalBreaks,0)/4,
    estAcesP1: s1.ace*11, estAcesP2: s2.ace*11,
    estDoubleFaultsP1: s1.df*4, estDoubleFaultsP2: s2.df*4,
    modelAgreement: {
      monteCarlo:mc.p1WinProb, logisticRegression:lr.p1WinProb,
      poisson:po.p1WinProb, analytical:an.p1WinProb,
      stdDeviation:std, confidence
    }
  };
}

async function runFullPrediction(p1id, p2id, surface, bestOf, tour, countryAcr='DEF', roundId=4, rankId=2, p1PriorMins=0, p2PriorMins=0) {
  await buildRankCache(tour);
  const [p1, p2, h2h, weather] = await Promise.all([
    getPlayerStats(p1id, tour),
    getPlayerStats(p2id, tour),
    getH2H(p1id, p2id, tour),
    getWeather(countryAcr, surface),
  ]);

  const mc = monteCarlo(p1, p2, surface, bestOf, h2h, weather, roundId);
  const lr = logisticReg(p1, p2, surface, bestOf, h2h, weather);
  const po = poissonModel(p1, p2, surface, bestOf, h2h);
  const an = analytical(p1, p2, surface, bestOf, h2h, weather);
  const sc = superCombined([mc, lr, po, an], p1, p2, surface, bestOf);

  const isGrandSlam = rankId >= 4;
  const roundNames = {1:'Q1',2:'Q2',3:'Q3',4:'R1',5:'R2',6:'R3',7:'R4(16)',8:'QF',9:'SF',10:'F',12:'F'};
  const levels = {1:'Challenger',2:'ATP 250',3:'ATP 500',4:'ATP 1000',5:'Grand Slam'};

  // ── ELITE INTELLIGENCE MODULES ──────────────────────────────────────────────
  const p1Intel = buildPlayerIntel(p1, surface, tour, p1PriorMins);
  const p2Intel = buildPlayerIntel(p2, surface, tour, p2PriorMins);

  // Apply physical/fatigue adjustments to final probability
  let adjProb = sc.p1WinProb;
  const fm = (window._learnedW?.fatigue || 1.0);
  const fatigueMapP1 = { 'High': -0.055 * fm, 'Medium': -0.025 * fm, 'Low': 0 };
  const fatigueMapP2 = { 'High': +0.055, 'Medium': +0.025, 'Low': 0 };
  adjProb += fatigueMapP1[p1Intel.fatigueRisk] || 0;
  adjProb += fatigueMapP2[p2Intel.fatigueRisk] || 0;

  // Surface score adjustment
  const surfDelta = (p1Intel.surfScore - p2Intel.surfScore) * 0.008;
  adjProb += surfDelta;
  adjProb = Math.min(0.95, Math.max(0.05, adjProb));

  const tactical = analyzeTacticalMatchup(p1, p2, surface, p1Intel, p2Intel);
  const tacMult = window._learnedW?.tactical || 1.0;
  adjProb += tactical.rawScore * 0.012 * tacMult; // tactical score adjusts prob with learned weight
  adjProb = Math.min(0.95, Math.max(0.05, adjProb));

  const upsetRisk = calcUpsetRisk(p1, p2, p1Intel, p2Intel, tactical, adjProb, surface, isGrandSlam);
  const momentum = analyzeMomentum(p1, p2, p1Intel, p2Intel);
  const liveAngles = buildLiveBettingAngles(p1, p2, p1Intel, p2Intel, tactical, upsetRisk, adjProb, bestOf);
  const eliteAnalysis = buildEliteAnalysis(p1, p2, surface, bestOf, p1Intel, p2Intel, tactical, upsetRisk, momentum, liveAngles, adjProb, h2h);

  // Build context factor summary (weather + tactical insights)
  const factorSummary = [];
  if (weather.isOutdoor) {
    weather.factors?.forEach(f => {
      factorSummary.push({ factor: f.factor, impact: f.impact, favors: f.favors || (adjProb > 0.5 ? p1.name : p2.name) });
    });
  }
  if (surface==='Clay') {
    const cb1=clayBonus(p1.country), cb2=clayBonus(p2.country);
    if (cb1>cb2) factorSummary.push({factor:'Clay Culture',impact:'Native clay-country advantage',favors:p1.name});
    else if (cb2>cb1) factorSummary.push({factor:'Clay Culture',impact:'Native clay-country advantage',favors:p2.name});
  }
  if (roundId >= 9) factorSummary.push({factor:'Deep Round',impact:'Tournament fatigue factor',favors:adjProb>0.5?p1.name:p2.name});
  if (isGrandSlam) factorSummary.push({factor:'Grand Slam Bo5',impact:'Physical durability amplified',favors:p1.elo>p2.elo?p1.name:p2.name});
  // Add top tactical insights as factors
  tactical.insights.slice(0,3).forEach(ins => factorSummary.push({ factor: ins.type, impact: ins.text, favors: ins.favors }));

  // Final adjusted set score based on adjProb
  const adjSetScore = bestOf===5
    ? (adjProb>0.72?'3-0':(adjProb>0.56?'3-1':(adjProb>0.44?'3-2':(adjProb>0.28?'2-3':'1-3'))))
    : (adjProb>0.62?'2-0':'2-1');

  return {
    player1: p1, player2: p2, surface, bestOf,
    contextFactors: {
      weather, round: roundNames[roundId]||'R1',
      tournamentLevel: levels[rankId]||'ATP',
      isGrandSlam, altitude:0, factorSummary, netAdjP1:adjProb
    },
    models: { monteCarlo:mc, logisticRegression:lr, poisson:po, analytical:an },
    superCombined: { ...sc, p1WinProb:adjProb, p2WinProb:1-adjProb, predictedSetScore: adjSetScore },
    predictedWinner: adjProb>0.5 ? p1.name : p2.name,
    winnerWinPct: Math.max(adjProb, 1-adjProb)*100,
    h2hSummary: h2h,
    eliteAnalysis,
  };
}

// ─── FIXTURES ────────────────────────────────────────────────────────────────
// ── Smart prediction scheduler — queues all fixtures, prioritises high-rank ones
async function schedulePredictions() {
  // Sort: Grand Slams & Challengers first, ITF last
  const queue = [...state.fixtures].sort((a,b) => {
    const ra = (b.tournament?.rankId||0) - (a.tournament?.rankId||0);
    return ra;
  });
  for (const f of queue) {
    if (state.predictions[f.id]) continue;
    const p1 = f.player1Id || f.player1?.id;
    const p2 = f.player2Id || f.player2?.id;
    if (!p1 || !p2) continue;
    try {
      const t = f.tournament || {};
      const surf = SURFACE_MAP[t.courtId] || 'Hard';
      const r = await runFullPrediction(
        p1, p2, surf, determineBestOf(f, state.tour), state.tour,
        t.countryAcr || 'DEF', f.round?.id || 4, t.rankId || 0
      );
      state.predictions[f.id] = r;
      const bar = document.getElementById(`pbar-${f.id}`);
      if (bar) bar.innerHTML = renderBar(r);
      // Auto-log to learning engine (fire-and-forget)
      logPrediction(f, r);
    } catch(e) {
      const bar = document.getElementById(`pbar-${f.id}`);
      if (bar) bar.innerHTML = `<div style="font-size:11px;color:var(--muted)">—</div>`;
    }
  }
}

async function loadFixtures() {
  const el = document.getElementById('fix-content');
  el.innerHTML = `<div class="spinner-wrap"><div class="big-spin"></div><div class="spin-msg" id="fix-msg">Fetching matches…</div></div>`;
  try {
    const fixtures = await fetchFixtures(state.tour, fmtDate(state.selectedDate));
    state.fixtures = fixtures;
    if (!fixtures.length) {
      el.innerHTML = `<div class="empty"><span class="empty-icon">🎾</span><div class="empty-msg">No matches on this date</div></div>`;
      return;
    }
    const msgEl = document.getElementById('fix-msg');
    if (msgEl) msgEl.textContent = `Loading ${fixtures.length} matches…`;
    renderFixtures();
    schedulePredictions(); // runs async in background — no await
  } catch(e) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">⚠️</span><div class="empty-msg">${e.message}</div></div>`;
  }
}

function renderFixtures() {
  const el = document.getElementById('fix-content');
  if (!state.fixtures.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">🎾</span><div class="empty-msg">No matches on this date</div></div>`;
    return;
  }

  // ── Build tournament groups ───────────────────────────────────────────────
  const groups = {};
  for (const f of state.fixtures) {
    const t = f.tournament || {};
    const key = t.id || t.name || 'unknown';
    if (!groups[key]) {
      const rankId = t.rankId || 0;
      let rankLabel, rankClass, rankOrder;
      if (rankId === 4)      { rankLabel='Grand Slam'; rankClass='gs';      rankOrder=0; }
      else if (rankId === 3) { rankLabel='Masters';    rankClass='atp1000'; rankOrder=1; }
      else if (rankId === 2) { rankLabel='ATP 500';    rankClass='atp500';  rankOrder=2; }
      else if (rankId === 1) { rankLabel='ATP 250/Challenger'; rankClass='chal'; rankOrder=3; }
      else                   { rankLabel='ITF';        rankClass='itf';     rankOrder=4; }
      const surf = SURFACE_MAP[t.courtId] || 'Hard';
      const surfPill = surf === 'Indoor Hard' ? 'Indoor' : surf;
      const country = t.countryAcr ? ` · ${t.countryAcr}` : '';
      groups[key] = {
        id: key, name: t.name || 'Unknown', rankId, rankLabel, rankClass, rankOrder,
        surf, surfPill, country, matches: []
      };
    }
    groups[key].matches.push(f);
  }

  // ── Sort groups by rank ───────────────────────────────────────────────────
  const sorted = Object.values(groups).sort((a,b) => a.rankOrder - b.rankOrder || a.name.localeCompare(b.name));
  const hasITF = sorted.some(g => g.rankOrder === 4);
  const showITF = state.showITF !== false;

  // ── Filter bar ────────────────────────────────────────────────────────────
  const visibleGroups = sorted.filter(g => showITF || g.rankOrder < 4);
  const totalMatches = visibleGroups.reduce((a,g)=>a+g.matches.length,0);

  let html = `<div class="tour-filter-bar">
    <span style="font-size:11px;color:var(--sub)">${totalMatches} matches · ${visibleGroups.length} events</span>
    <span style="flex:1"></span>`;

  if (hasITF) {
    html += `<button class="filter-btn ${showITF?'active':''}" onclick="toggleITF()">ITF/M15/M25</button>`;
  }
  html += `</div>`;

  // ── Build tournament sections ─────────────────────────────────────────────
  for (const g of visibleGroups) {
    const isCollapsed = state.collapsed?.[g.id] || false;
    const surfPill = g.surfPill;
    html += `
    <div class="tour-group" id="tg-${g.id}">
      <div class="tour-group-header" onclick="toggleGroup('${g.id}')">
        <span class="tgh-rank ${g.rankClass}">${g.rankLabel}</span>
        <span class="tgh-name">${g.name}</span>
        <span class="tgh-surf"><span class="pill pill-${surfPill}" style="font-size:9px;padding:2px 7px">${g.surf}</span></span>
        <span class="tgh-count">${g.matches.length}</span>
        <span class="tgh-arrow ${isCollapsed?'':'open'}">▼</span>
      </div>
      <div class="tour-cards" id="tc-${g.id}" style="${isCollapsed?'display:none':''}">`;

    for (const f of g.matches) {
      const surf = f.surface || SURFACE_MAP[(f.tournament||{}).courtId] || 'Hard';
      const pillKey = surf === 'Indoor Hard' ? 'Indoor' : surf;
      const pred = state.predictions[f.id];
      html += `
        <div class="card fix-card" onclick="openFixture(${f.id})">
          <div class="card-p">
            <div class="fix-meta">
              <span class="fix-tag">Bo${determineBestOf(f, state.tour)}</span>
              ${f.round?.name ? `<span class="fix-tag">${f.round.name}</span>` : ''}
              ${f.seed1||f.seed2 ? `<span class="fix-tag" style="color:var(--accent)">Seeds</span>` : ''}
            </div>
            <div class="players-row">
              <div class="pcol">
                <div class="pnm">${f.player1?.name||'TBA'}</div>
                ${f.seed1?`<div class="pseed">[${f.seed1}]</div>`:''}
              </div>
              <div class="vs-badge">VS</div>
              <div class="pcol right">
                <div class="pnm">${f.player2?.name||'TBA'}</div>
                ${f.seed2?`<div class="pseed">[${f.seed2}]</div>`:''}
              </div>
            </div>
            <div id="pbar-${f.id}">${pred ? renderBar(pred) : '<div class="pred-loading"><div class="mini-spin"></div><span>Calculating…</span></div>'}</div>
          </div>
        </div>`;
    }
    html += `</div></div>`;
  }

  el.innerHTML = html;
}

function toggleGroup(id) {
  if (!state.collapsed) state.collapsed = {};
  state.collapsed[id] = !state.collapsed[id];
  const cards = document.getElementById(`tc-${id}`);
  const arrow = document.querySelector(`#tg-${id} .tgh-arrow`);

// ─── DETAIL HTML ─────────────────────────────────────────────────────────────
function buildDetail(r) {
  const c=r.superCombined, p1=r.player1, p2=r.player2;
  const isP1=c.p1WinProb>0.5, cf=r.contextFactors||{}, h2h=r.h2hSummary;
  const ea=r.eliteAnalysis||{};
  const p1i=ea.p1Intel||{}, p2i=ea.p2Intel||{};
  const tac=ea.tactical||{}, ur=ea.upsetRisk||{};
  const mom=ea.momentum||{}, la=ea.liveAngles||[];
  const es=ea.eliteSummary||{};
  const wemoji={Clear:'☀️',Hot:'🌤️','Extreme Heat':'🔥',Overcast:'☁️','Rain Risk':'🌧️',Windy:'🌬️',Cold:'🥶',Indoor:'🏟️'};
  const fatigueColor={'Low':'#69f0ae','Medium':'#ffcc80','High':'#ff6b6b'};
  const confColor={'Very High':'#69f0ae','High':'#69f0ae','Medium':'#ffcc80','Low':'#ff6b6b'};

  // ── WEATHER / CONDITIONS HEADER
  const w=cf.weather||{};
  const chips=[
    `${wemoji[w.condition]||'🌡️'} ${w.isOutdoor?`${w.condition||''} · ${Math.round(w.tempC||20)}°C`:'Indoor'}`,
    ...(w.isOutdoor&&w.windKph>15?[`💨 ${Math.round(w.windKph)}km/h`]:[]),
    ...(w.isOutdoor&&w.rainProbPct>20?[`🌧️ ${Math.round(w.rainProbPct)}%`]:[]),
    `${cf.round||'R1'} · ${cf.tournamentLevel||'ATP'}`,
    ...(cf.isGrandSlam?['🏆 Grand Slam']:[]),
    `Bo${r.bestOf}`,
  ];

  // ── DETECTORS BANNER
  const det = ur.detectors||{};
  const detectorBanners = [
    det.fragileFavorite ? `<div class="detector detector-fragile">💔 FRAGILE FAVORITE — ${isP1?p2.name:p1.name}'s form does not match reputation</div>` : '',
    det.dangerousUnderdog ? `<div class="detector detector-danger">⚡ DANGEROUS UNDERDOG — ${!isP1?p2.name:p1.name} has disruptive style</div>` : '',
    det.surfaceFraud ? `<div class="detector detector-fraud">🚨 SURFACE FRAUD — ${isP1?p2.name:p1.name}'s surface record inflated</div>` : '',
    det.fatigueCollapse ? `<div class="detector detector-fatigue">💀 FATIGUE COLLAPSE RISK — ${isP1?p2.name:p1.name} severely fatigued</div>` : '',
  ].filter(Boolean).join('');

  // ── PLAYER PHYSICAL CARDS
  function physCard(p, intel, win) {
    const fr = intel.fatigueRisk||'Low';

// LEARNING ENGINE — persistent prediction logger + self-improving weights
// ══════════════════════════════════════════════════════════════════════════════
const LEARN_URL = 'https://app.base44.com/functions/learningEngine';

async async function learnFetch(payload) {
  try {
    const r = await fetch(LEARN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return await r.json();
  } catch(e) { return { ok: false, error: e.message }; }
}

// Auto-log a prediction when detail is opened
async function logPrediction(f, r) {
  if (!f?.id || !r) return;
  const ea = r.eliteAnalysis || {};
  const det = ea.upsetRisk?.detectors || {};
  learnFetch({
    action: 'log_prediction',
    fixture_id: f.id,
    match_date: f.date || new Date().toISOString(),
    tour: state.tour,
    surface: r.surface,
    best_of: r.bestOf,
    tournament_name: f.tournament?.name || '',
    round_name: f.round?.name || '',
    p1_id: r.player1.id, p1_name: r.player1.name,
    p2_id: r.player2.id, p2_name: r.player2.name,
    predicted_winner_id: r.superCombined.p1WinProb > 0.5 ? r.player1.id : r.player2.id,
    predicted_winner_name: r.predictedWinner,
    predicted_win_pct: r.winnerWinPct,
    predicted_set_score: r.superCombined.predictedSetScore,
    model_mc: r.models?.monteCarlo?.p1WinProb || 0.5,
    model_lr: r.models?.logisticRegression?.p1WinProb || 0.5,
    model_po: r.models?.poisson?.p1WinProb || 0.5,
    model_an: r.models?.analytical?.p1WinProb || 0.5,
    upset_risk_score: ea.upsetRisk?.score || 0,
    fatigue_risk_p1: ea.p1Intel?.fatigueRisk || 'Low',
    fatigue_risk_p2: ea.p2Intel?.fatigueRisk || 'Low',
    surface_score_p1: ea.p1Intel?.surfScore || 5,
    surface_score_p2: ea.p2Intel?.surfScore || 5,
    tactical_score: ea.tactical?.rawScore || 0,
    tactical_edge: ea.tactical?.tacticalEdge || 'Neutral',
    fragile_favorite: det.fragileFavorite || false,
    dangerous_underdog: det.dangerousUnderdog || false,
    surface_fraud: det.surfaceFraud || false,
    fatigue_collapse: det.fatigueCollapse || false,
  });
}

// Fetch learned weights and apply to superCombined weighting
let learnedWeights = null;
async function fetchLearnedWeights() {
  const res = await learnFetch({ action: 'get_weights' });
  if (res.ok && res.weights) {
    learnedWeights = res.weights;
    // Update superCombined weights dynamically
    window._learnedW = {
      mc: res.weights.w_mc || 0.30,
      lr: res.weights.w_lr || 0.25,
      po: res.weights.w_po || 0.25,
      an: res.weights.w_an || 0.20,
      fatigue: res.weights.fatigue_multiplier || 1.0,
      tactical: res.weights.tactical_multiplier || 1.0,
      upsetThreshold: res.weights.upset_risk_threshold || 35,
    };
    // Show accuracy badge in header if data exists
    if (res.weights.total_predictions > 0) {
      const pct = res.weights.accuracy_pct?.toFixed(0) || '0';
      const badge = document.getElementById('learn-badge');
      if (badge) { badge.textContent = `${pct}% acc`; badge.style.display='inline-flex'; }
    }
  }
}

    </div>

    <!-- STATS ROW -->
    <div class="learn-grid">
      <div class="learn-stat"><div class="sv">${h.total}</div><div class="sl">Logged</div></div>
      <div class="learn-stat"><div class="sv">${h.pending}</div><div class="sl">Pending</div></div>
      <div class="learn-stat"><div class="sv">v${w.version||1}</div><div class="sl">Model Ver.</div></div>
    </div>

    <!-- PENDING OUTCOMES -->
    <div class="sec">⏳ Awaiting Outcomes</div>
    ${pendCards}

    <!-- SURFACE BREAKDOWN -->
    <div class="elite-section">
      <div class="elite-sec-header"><span class="elite-sec-icon">🎾</span><span class="elite-sec-title">Accuracy by Surface</span></div>
      ${surfRows}
    </div>

    <!-- FAILURE FLAGS -->
    <div class="elite-section">
      <div class="elite-sec-header"><span class="elite-sec-icon">🚩</span><span class="elite-sec-title">Missed Call Patterns</span></div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:8px">How many wrong predictions had each flag active</div>
      ${flagRows||'<div style="font-size:12px;color:var(--sub)">No data yet</div>'}
    </div>

    <!-- LEARNED WEIGHTS -->
    <div class="elite-section">
      <div class="elite-sec-header"><span class="elite-sec-icon">⚙️</span><span class="elite-sec-title">Learned Model Weights</span></div>
      <div class="weights-grid">${weightCards}</div>
      ${w.notes ? `<div style="font-size:10px;color:var(--sub);font-style:italic">${w.notes.split('|')[0]}</div>` : ''}
    </div>

    <!-- HISTORY -->
    <div class="sec">📋 Prediction History</div>
    <div class="ctx-card">${histRows}</div>
  `;
}

async function submitOutcome(fixtureId, winnerId, winnerName, cardId) {
  const card = document.getElementById(`pc-${cardId}`);
  if (card) card.innerHTML = '<div style="text-align:center;padding:16px;color:var(--sub)"><div class="mini-spin"></div> Logging…</div>';

  const res = await learnFetch({
    action: 'log_outcome',
    fixture_id: fixtureId,
    actual_winner_id: winnerId,
    actual_winner_name: winnerName,
  });

  if (res.ok) {
    const icon = res.correct ? '✅' : '❌';
    const color = res.correct ? '#69f0ae' : '#ff6b6b';
    if (card) card.innerHTML = `
      <div style="text-align:center;padding:12px">
        <div style="font-size:24px">${icon}</div>
        <div style="color:${color};font-weight:700;margin:4px 0">${res.correct ? 'Correct prediction!' : 'Wrong prediction'}</div>
        <div style="font-size:10px;color:var(--sub);margin-top:6px">${res.failure_analysis||''}</div>
        <div style="font-size:10px;color:var(--accent);margin-top:4px">Running accuracy: ${res.accuracy?.pct}% (${res.accuracy?.correct}/${res.accuracy?.total})</div>
      </div>`;
    // Refresh weights in background
    fetchLearnedWeights();
  } else {
    if (card) card.innerHTML = `<div style="color:#ff6b6b;padding:10px;font-size:12px">Error: ${res.error}</div>`;
  }
}


// ══════════════════════════════════════════════════════════════════════════════
// TRACK THIS MATCH — explicit import to Learn tab
// ══════════════════════════════════════════════════════════════════════════════

// Store tracked fixture IDs in memory (persisted via learnFetch as a side-effect)
if (!window._trackedIds) window._trackedIds = new Set();

async function trackThisMatch(fixtureId, btn) {
  if (!fixtureId) return;
  const alreadyTracked = window._trackedIds.has(fixtureId);

  if (alreadyTracked) {
    // Already tracked — jump to Learn tab to show it
    closeDetail();
    setTab('learn', document.querySelector('.tab[onclick*=\'learn\']'));
    return;
  }

  // Mark as tracked optimistically
  window._trackedIds.add(fixtureId);
  if (btn) {
    btn.classList.remove('track');
    btn.classList.add('tracked');
    btn.textContent = '⏳ Logging…';
    btn.disabled = true;
  }

  // Get the fixture and prediction result
  const f = state.fixtures.find(x => x.id === fixtureId);
  const r = state.predictions[fixtureId];
  if (!f || !r) {
    if (btn) { btn.textContent = '⚠️ No data yet'; btn.disabled = false; }
    return;
  }

  // Log to learning engine (same as auto-log but explicit = shows confirmation)
  const ea = r.eliteAnalysis || {};
  const det = ea.upsetRisk?.detectors || {};
  const res = await learnFetch({
    action: 'log_prediction',
    fixture_id: fixtureId,
    match_date: f.date || new Date().toISOString(),
    tour: state.tour,
    surface: r.surface,
    best_of: r.bestOf,
    tournament_name: f.tournament?.name || '',
    round_name: f.round?.name || '',
    p1_id: r.player1.id, p1_name: r.player1.name,
    p2_id: r.player2.id, p2_name: r.player2.name,
    predicted_winner_id: r.superCombined.p1WinProb > 0.5 ? r.player1.id : r.player2.id,
    predicted_winner_name: r.predictedWinner,
    predicted_win_pct: r.winnerWinPct,
    predicted_set_score: r.superCombined.predictedSetScore,
    model_mc: r.models?.monteCarlo?.p1WinProb || 0.5,
    model_lr: r.models?.logisticRegression?.p1WinProb || 0.5,
    model_po: r.models?.poisson?.p1WinProb || 0.5,
    model_an: r.models?.analytical?.p1WinProb || 0.5,
    upset_risk_score: ea.upsetRisk?.score || 0,
    fatigue_risk_p1: ea.p1Intel?.fatigueRisk || 'Low',
    fatigue_risk_p2: ea.p2Intel?.fatigueRisk || 'Low',
    surface_score_p1: ea.p1Intel?.surfScore || 5,
    surface_score_p2: ea.p2Intel?.surfScore || 5,
    tactical_score: ea.tactical?.rawScore || 0,
    tactical_edge: ea.tactical?.tacticalEdge || 'Neutral',
    fragile_favorite: det.fragileFavorite || false,
    dangerous_underdog: det.dangerousUnderdog || false,
    surface_fraud: det.surfaceFraud || false,
    fatigue_collapse: det.fatigueCollapse || false,
  });

  if (res.ok || res.id) {
    if (btn) {
      btn.classList.add('tracked');
      btn.innerHTML = '✅ In Learn tab — tap to view';
      btn.disabled = false;
      btn.onclick = () => {
        closeDetail();
        setTab('learn', document.querySelector('.tab[onclick*=\'learn\']'));
      };
    }
    // Show a quick toast
    showToast('🧠 Match tracked! Open Learn tab to log the outcome.');
  } else {
    window._trackedIds.delete(fixtureId);
    if (btn) { btn.classList.remove('tracked'); btn.classList.add('track'); btn.textContent = '🧠 Track this match'; btn.disabled = false; }
    showToast('⚠️ Could not log — ' + (res.error || 'unknown error'), true);
  }
}

// Update track button state when reopening a match detail
function updateTrackBtn(fixtureId) {
  const btn = document.getElementById(`track-btn-${fixtureId}`);
  if (!btn) return;
  if (window._trackedIds?.has(fixtureId)) {
    btn.classList.remove('track');
    btn.classList.add('tracked');
    btn.innerHTML = '✅ In Learn tab — tap to view';
    btn.onclick = () => {
      closeDetail();
      setTab('learn', document.querySelector('.tab[onclick*=\'learn\']'));
    };
  }
}

// Toast notification helper
function showToast(msg, isError=false) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);'+
      'background:#1a2a3a;color:#fff;padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;'+
      'z-index:9999;opacity:0;transition:all .3s;pointer-events:none;border:1px solid #2a4a6a;'+
      'box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:280px;text-align:center;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = isError ? '#3a1a1a' : '#1a2a3a';
  t.style.borderColor = isError ? '#6a2a2a' : '#2a4a6a';
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, 2800);
}


function closeLearnAndOpen(fixtureId) {
  setTab('fixtures', document.querySelector('.tab[onclick*=\'fixtures\']'));
  setTimeout(() => openFixture(fixtureId), 150);
}


// ══════════════════════════════════════════════════════════════════════════════
// IMPORT ALL TODAY — bulk log every computed prediction to the learning engine
// ══════════════════════════════════════════════════════════════════════════════
async function importAllToday(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Importing…'; }

  const fixtures = state.fixtures;
  const predictions = state.predictions;
  let logged = 0, skipped = 0, failed = 0;

  // Only import fixtures that have a completed prediction
  const toImport = fixtures.filter(f => {
    const p1 = f.player1Id || f.player1?.id;
    const p2 = f.player2Id || f.player2?.id;
    return p1 && p2 && predictions[f.id];
  });

  if (!toImport.length) {
    showToast('⏳ No predictions ready yet — wait for the models to finish running', false);
    if (btn) { btn.disabled = false; btn.textContent = 'Import All'; }
    return;
  }

  // Update button to show progress
  const updateProgress = (done, total) => {
    if (btn) btn.textContent = `${done}/${total}…`;
  };

  for (let i = 0; i < toImport.length; i++) {
    const f = toImport[i];
    const r = predictions[f.id];
    updateProgress(i + 1, toImport.length);

    try {
      const ea = r.eliteAnalysis || {};
      const det = ea.upsetRisk?.detectors || {};
      const res = await learnFetch({
        action: 'log_prediction',
        fixture_id: f.id,
        match_date: f.date || fmtDate(state.selectedDate),
        tour: state.tour,
        surface: r.surface || SURFACE_MAP[(f.tournament||{}).courtId] || 'Hard',
        best_of: r.bestOf || determineBestOf(f, state.tour),
        tournament_name: f.tournament?.name || '',
        round_name: f.round?.name || '',
        p1_id: r.player1?.id || f.player1?.id,
        p1_name: r.player1?.name || f.player1?.name || '',
        p2_id: r.player2?.id || f.player2?.id,
        p2_name: r.player2?.name || f.player2?.name || '',
        predicted_winner_id: r.superCombined?.p1WinProb > 0.5 ? (r.player1?.id || f.player1?.id) : (r.player2?.id || f.player2?.id),
        predicted_winner_name: r.predictedWinner || '',
        predicted_win_pct: r.winnerWinPct || 50,
        predicted_set_score: r.superCombined?.predictedSetScore || '',
        model_mc: r.models?.monteCarlo?.p1WinProb || 0.5,
        model_lr: r.models?.logisticRegression?.p1WinProb || 0.5,
        model_po: r.models?.poisson?.p1WinProb || 0.5,
        model_an: r.models?.analytical?.p1WinProb || 0.5,
        upset_risk_score: ea.upsetRisk?.score || 0,
        fatigue_risk_p1: ea.p1Intel?.fatigueRisk || 'Low',
        fatigue_risk_p2: ea.p2Intel?.fatigueRisk || 'Low',
        surface_score_p1: ea.p1Intel?.surfScore || 5,
        surface_score_p2: ea.p2Intel?.surfScore || 5,
        tactical_score: ea.tactical?.rawScore || 0,
        tactical_edge: ea.tactical?.tacticalEdge || 'Neutral',
        fragile_favorite: det.fragileFavorite || false,
        dangerous_underdog: det.dangerousUnderdog || false,
        surface_fraud: det.surfaceFraud || false,
        fatigue_collapse: det.fatigueCollapse || false,
      });
      if (res.ok || res.id) { logged++; window._trackedIds?.add(f.id); }
      else if (res.error?.includes('already') || res.error?.includes('duplicate')) skipped++;
      else { failed++; console.warn('log failed for', f.id, res.error); }
    } catch(e) {
      failed++;
      console.warn('import error for fixture', f.id, e);
    }
  }

  const msg = `✅ Imported ${logged} predictions${skipped ? ` · ${skipped} already logged` : ''}${failed ? ` · ${failed} failed` : ''}`;
  showToast(msg);
  if (btn) {
    btn.textContent = `✅ ${logged} logged`;
    btn.style.background = '#1a4a2a';
    btn.style.color = '#81c784';
  }

  // Refresh the learn tab to show the newly logged matches
  setTimeout(() => loadLearnTab(), 800);
}

// Boot: fetch learned weights so they're applied from first prediction
fetchLearnedWeights();

// ─── BOOT ────────────────────────────────────────────────────────────────────
initQuickPicks();
updateDateUI();
loadFixtures();
</script>
